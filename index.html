<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Golf tournament strategy simulator - analyze courses, build game plans, and optimize your scoring strategy.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Chalk Talk Golf">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Chalk Talk Golf</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Force clear old service worker caches on deploy
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let reg of registrations) { reg.unregister(); }
      });
      caches.keys().then(function(names) {
        for (let name of names) { caches.delete(name); }
      });
    }
  </script>
</head>
<body>
  <div id="auth-gate" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a1a0a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;">
    <div style="text-align:center;padding:40px;background:#1a2e1a;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.4);">
      <h1 style="color:#4CAF50;margin-bottom:8px;font-size:24px;">Chalk Talk Golf</h1>
      <p style="color:#888;margin-bottom:24px;font-size:14px;">This site is in development</p>
      <input id="auth-input" type="password" placeholder="Enter password"
        style="padding:12px 16px;font-size:16px;border:1px solid #333;border-radius:8px;background:#111;color:#fff;width:240px;outline:none;"
        onkeydown="if(event.key==='Enter')document.getElementById('auth-btn').click()">
      <br><br>
      <button id="auth-btn" onclick="checkAuth()"
        style="padding:12px 32px;font-size:16px;background:#4CAF50;color:#fff;border:none;border-radius:8px;cursor:pointer;">
        Enter
      </button>
      <p id="auth-error" style="color:#f44336;margin-top:12px;display:none;">Incorrect password</p>
    </div>
  </div>
  <script>
    const PASS_HASH = '03b2f6c381a8f0513f2e5fca0c22d496b0769cdc92ba40711662ed88c96f9d7e';
    async function sha256(msg) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    async function checkAuth() {
      const input = document.getElementById('auth-input').value;
      const hash = await sha256(input);
      if (hash === PASS_HASH) {
        sessionStorage.setItem('ctg_auth', '1');
        loadApp();
      } else {
        document.getElementById('auth-error').style.display = 'block';
      }
    }
    function loadApp() {
      document.getElementById('auth-gate').style.display = 'none';
      const s = document.createElement('script');
      s.src = 'flutter_bootstrap.js';
      s.async = true;
      document.body.appendChild(s);
    }
    // Skip gate if already authenticated this session
    if (sessionStorage.getItem('ctg_auth') === '1') {
      loadApp();
    }
  </script>
</body>
</html>
